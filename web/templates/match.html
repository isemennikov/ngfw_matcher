{% extends "layout.html" %}
{% block title %}Match — ngfw-matcher{% endblock %}
{% block header %}Match Traffic{% endblock %}
{% block content %}

<div class="max-w-3xl">
  <form hx-post="/match"
        hx-target="#match-result"
        hx-swap="innerHTML"
        hx-indicator="#match-spinner"
        class="bg-white rounded-xl border border-slate-200 p-6 mb-6">

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1.5">Source IP / CIDR</label>
        <textarea name="src" rows="3"
                  placeholder="10.1.2.3&#10;10.0.0.0/8&#10;или через запятую"
                  class="input-field resize-none font-mono text-xs"></textarea>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1.5">Destination IP / CIDR</label>
        <textarea name="dst" rows="3"
                  placeholder="8.8.8.8&#10;10.0.0.0/8&#10;или через запятую"
                  class="input-field resize-none font-mono text-xs"></textarea>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1.5">Port</label>
        <input type="text" name="dport" placeholder="443  или  any"
               class="input-field">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1.5">Protocol</label>
        <select name="proto" class="input-field">
          <option value="any">any</option>
          <option value="tcp">TCP</option>
          <option value="udp">UDP</option>
          <option value="icmp">ICMP</option>
        </select>
      </div>
    </div>

    <div class="flex items-center gap-4 mb-4">
      <label class="flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" name="overlap" value="1"
               class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-400">
        <span class="text-sm text-slate-600">Режим перекрытий</span>
        <span class="text-xs text-slate-400">(overlap — любое пересечение)</span>
      </label>
    </div>

    <div class="flex items-center gap-4">
      <button type="submit"
              class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium
                     px-6 py-2 rounded-lg transition-colors">
        Проверить
      </button>
      <span id="match-spinner"
            class="htmx-indicator flex items-center gap-2 text-sm text-slate-500">
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Анализируем…
      </span>
    </div>
  </form>

  <div id="match-result"></div>
</div>

<style>
  .input-field {
    @apply w-full border border-slate-200 rounded-lg px-3 py-2 text-sm
           text-slate-800 focus:outline-none focus:border-blue-400
           placeholder-slate-400 bg-white;
  }
</style>
{% endblock %}

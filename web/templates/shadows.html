{% extends "layout.html" %}
{% block title %}Shadows — ngfw-matcher{% endblock %}
{% block header %}Shadow Analysis{% endblock %}
{% block content %}

<div class="max-w-4xl">
  <form hx-post="/shadows"
        hx-target="#shadows-result"
        hx-swap="innerHTML"
        hx-indicator="#shadows-spinner"
        class="bg-white rounded-xl border border-slate-200 p-6 mb-6">

    <div class="flex items-center gap-6 mb-4">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="radio" name="mode" value="full" checked class="text-blue-600">
        <div>
          <div class="text-sm font-medium text-slate-700">Полное затемнение</div>
          <div class="text-xs text-slate-400">A ⊇ B по src, dst и svc</div>
        </div>
      </label>
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="radio" name="mode" value="partial" class="text-blue-600">
        <div>
          <div class="text-sm font-medium text-slate-700">Частичное пересечение</div>
          <div class="text-xs text-slate-400">A ∩ B ≠ ∅ по всем полям</div>
        </div>
      </label>
    </div>

    <div class="flex items-center gap-4">
      <button type="submit"
              class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium
                     px-6 py-2 rounded-lg transition-colors">
        Анализировать
      </button>
      <span id="shadows-spinner" class="htmx-indicator flex items-center gap-2 text-sm text-slate-500">
        <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
        </svg>
        Анализируем (~10–40 сек)…
      </span>
    </div>
  </form>

  <div id="shadows-result"></div>
</div>
{% endblock %}
